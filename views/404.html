<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - System Error</title>
    <style>
        body {
            background-color: #0d1117;
            color: #39d353;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .error-container {
            border: 1px solid #39d353;
            padding: 40px 60px;
            border-radius: 8px;
            box-shadow: 0 0 20px rgba(57, 211, 83, 0.15);
            max-width: 500px;
        }
        h1 {
            font-size: 5rem;
            margin: 0 0 10px 0;
            letter-spacing: 5px;
            text-shadow: 0 0 10px rgba(57, 211, 83, 0.5);
        }
        p {
            font-size: 1.2rem;
            line-height: 1.5;
            margin-bottom: 30px;
        }
        .btn {
            color: #0d1117;
            background-color: #39d353;
            text-decoration: none;
            padding: 12px 24px;
            font-weight: bold;
            border-radius: 4px;
            transition: all 0.2s ease-in-out;
            border: 1px solid #39d353;
        }
        .btn:hover {
            background-color: transparent;
            color: #39d353;
            box-shadow: 0 0 10px rgba(57, 211, 83, 0.3);
        }
        .cursor {
            display: inline-block;
            width: 10px;
            height: 1.2rem;
            background-color: #39d353;
            animation: blink 1s step-end infinite;
            vertical-align: text-bottom;
            margin-left: 5px;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <p>
            > Request parsed...<br>
            > Route not found.<br>
            > Seems you got lost o7.<span class="cursor"></span>
        </p>
        <a href="/public/index.html" class="btn">Return to Safety</a>
    </div>
</body>
</html>
